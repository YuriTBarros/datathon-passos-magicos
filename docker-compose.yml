services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passos-magicos-api
    ports:
      - "8008:8008"
    volumes:
      - ./:/app
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8008 --reload
    networks:
      - datathon-net

  mlflow-exporter:
    build:
      context: ./monitoring/exporters
    container_name: mlflow-exporter
    volumes:
      - ./mlflow.db:/app/mlflow.db
    ports:
      - "8001:8001"
    restart: always 
    networks:
      - datathon-net     

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - datathon-net

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - datathon-net

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    volumes:
      - ./monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3102:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - datathon-net

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: always
    volumes:
      - ./monitoring/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - datathon-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/config/grafana.ini:/etc/grafana/grafana.ini
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=qwe123
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - datathon-net

networks:
  datathon-net:
    driver: bridge

volumes:
  prometheus_data:
  loki_data:
  grafana_data: