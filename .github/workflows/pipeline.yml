name: CI/CD Pipeline - Passos Mágicos

# Gatilhos: Quando essa pipeline deve rodar?
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # --- JOB 1: INTEGRAÇÃO CONTÍNUA (Garantia de Qualidade) ---
  quality-check:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Baixa o código do seu repositório para a máquina virtual do GitHub
    - name: Checkout do código
      uses: actions/checkout@v3

    # 2. Instala o Python 3.11 (versão estável e comum para ML)
    - name: Configurar Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    # 3. Instala as bibliotecas listadas no requirements.txt
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Verifica se o código segue o padrão PEP8 (Linting)
    - name: Linting com Flake8
      run: |
        # E9, F63, F7, F82 são erros graves de sintaxe (param o build)
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Avisos menores de estilo (não quebram a pipeline, apenas alertam)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    # 5. Roda os testes unitários e gera relatório de cobertura
    - name: Testes Unitários e Cobertura
      run: |
        # Roda o unittest descobrindo testes na pasta 'tests'
        coverage run -m unittest discover tests
        
        # Exibe o relatório no log do GitHub Actions
        echo "=== Relatório de Cobertura ==="
        coverage report -m

