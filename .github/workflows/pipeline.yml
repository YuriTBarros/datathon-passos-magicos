name: MLOps CI/CD Pipeline - Passos Mágicos

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:

  # --- ESTÁGIO 1: VALIDAÇÃO TÉCNICA E QUALIDADE ---
  quality-and-ml-validation:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do repositório
      uses: actions/checkout@v3

    - name: Ambiente Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Instalação de dependências do projeto
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage

    - name: Análise estática de código (Flake8)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Validação de Schema da Feature Store (Feast Plan)
      run: |
        cd feature_repo
        mkdir -p data
        feast plan

    - name: Execução de Testes Unitários e Cobertura
      run: |
        export PYTHONPATH=.
        coverage run -m unittest discover -s tests -v
        coverage report -m --fail-under=60


  # --- ESTÁGIO 2: VERIFICAÇÃO DE INTEGRIDADE DO MODELO ---
  model-integrity-check:
    needs: quality-and-ml-validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Ambiente Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalação de dependências
        run: pip install -r requirements.txt

      - name: Check Training Script
        run: |
          export PYTHONPATH=.
          ls -R src/
          python3 -m py_compile src/models/train.py


